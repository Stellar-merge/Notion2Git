name: Notion to Git Sync

on:
  schedule:
    - cron: '0 * * * *' # Run hourly
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write # Required to push commits to the repo

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for proper git operations

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync Dependencies
        run: uv sync --frozen

      - name: Run Notion Sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTES_GITHUB_USERNAME: ${{ secrets.NOTES_GITHUB_USERNAME }}
          NOTES_GITHUB_REPOSITORY: ${{ secrets.NOTES_GITHUB_REPOSITORY }}
          GIT_NAME: "github-actions[bot]"
          GIT_EMAIL: "github-actions[bot]@users.noreply.github.com"
          DOWNLOAD_IMAGES: "true"
          DELETE_ON_GITHUB: "true"
        run: uv run sync.py sync
